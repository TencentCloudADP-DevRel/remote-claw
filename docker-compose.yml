services:
  desktop:
    build: .
    container_name: openclaw-desktop
    hostname: openclaw
    restart: unless-stopped
    ports:
      - "5901:5901"   # VNC — macOS: vnc://IP:5901
      - "6080:6080"   # noVNC — 浏览器: http://IP:6080
    environment:
      - VNC_PW=openclaw
      - VNC_RESOLUTION=1920x1080
      - VNC_COL_DEPTH=24
    security_opt:
      - seccomp=unconfined      # 允许 Firefox 沙箱创建用户命名空间
    cap_add:
      - SYS_ADMIN               # Firefox content sandbox 需要 clone(CLONE_NEWUSER)
    volumes:
      - desktop-home:/root
      - /root/remote-claw/shared:/shared             # 宿主机共享目录
      - screenshots:/screenshots                      # 截图输出目录
    shm_size: "4g"
    mem_limit: 16g
    cpus: 12

volumes:
  desktop-home:
    driver: local
  screenshots:
    driver: local

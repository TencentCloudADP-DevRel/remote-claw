services:
  desktop:
    image: ${OPENCLAW_IMAGE:-tencentcloudadpdevrel/openclaw-desktop:latest}
    container_name: ${OPENCLAW_CONTAINER_NAME:-openclaw-desktop}
    hostname: openclaw
    init: true
    restart: unless-stopped
    ports:
      - "${OPENCLAW_VNC_PORT:-5901}:5901"         # VNC
      - "${OPENCLAW_NOVNC_PORT:-6080}:6080"       # noVNC (浏览器)
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"   # Gateway (ws://)
    environment:
      # ---- 桌面/VNC ----
      - VNC_PW=${OPENCLAW_VNC_PASSWORD:-openclaw}
      - VNC_RESOLUTION=${OPENCLAW_VNC_RESOLUTION:-1920x1080}
      - VNC_COL_DEPTH=${OPENCLAW_VNC_DEPTH:-24}
      - GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - FIREFOX_PROCESS_COUNT=${OPENCLAW_FIREFOX_PROCESS_COUNT:-4}
      - FIREFOX_WEB_ISOLATED_COUNT=${OPENCLAW_FIREFOX_WEB_ISOLATED_COUNT:-2}
      - FIREFOX_CACHE_MEMORY_KB=${OPENCLAW_FIREFOX_CACHE_MEMORY_KB:-131072}
      # ---- Portal（Portal 模式使用） ----
      - PORTAL_URL=${PORTAL_URL:-}
      - REGISTER_TOKEN=${REGISTER_TOKEN:-}
      - PUBLIC_IP=${PUBLIC_IP:-}
      - PUBLIC_GATEWAY_URL=${PUBLIC_GATEWAY_URL:-}
      # ---- Gateway + AI 模型 ----
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    volumes:
      - desktop-home:/root
      - ./shared:/shared
      - screenshots:/screenshots
      - ./openclaw-config:/root/.openclaw
    shm_size: "${OPENCLAW_SHM_SIZE:-2g}"
    mem_limit: "${OPENCLAW_MEM_LIMIT:-8g}"
    cpus: ${OPENCLAW_CPUS:-4}

volumes:
  desktop-home:
    driver: local
  screenshots:
    driver: local

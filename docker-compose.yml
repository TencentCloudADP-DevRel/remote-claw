services:
  desktop:
    image: tencentcloudadpdevrel/openclaw-desktop:latest
    build: .
    container_name: ${OPENCLAW_CONTAINER_NAME:-openclaw-desktop}
    hostname: openclaw
    init: true
    restart: unless-stopped
    ports:
      - "${OPENCLAW_VNC_PORT:-5901}:5901"         # VNC — macOS: vnc://IP:5901
      - "${OPENCLAW_NOVNC_PORT:-6080}:6080"       # noVNC — 浏览器: http://IP:6080
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"   # OpenClaw Gateway — Portal 连接: ws://IP:PORT
    environment:
      # ---- 桌面/VNC ----
      - VNC_PW=${OPENCLAW_VNC_PASSWORD:-openclaw}
      - VNC_RESOLUTION=${OPENCLAW_VNC_RESOLUTION:-1920x1080}
      - VNC_COL_DEPTH=${OPENCLAW_VNC_DEPTH:-24}
      - GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - FIREFOX_PROCESS_COUNT=${OPENCLAW_FIREFOX_PROCESS_COUNT:-4}
      - FIREFOX_WEB_ISOLATED_COUNT=${OPENCLAW_FIREFOX_WEB_ISOLATED_COUNT:-2}
      - FIREFOX_CACHE_MEMORY_KB=${OPENCLAW_FIREFOX_CACHE_MEMORY_KB:-131072}
      # ---- Portal 注册（Portal 模式使用） ----
      - PORTAL_URL=${PORTAL_URL:-}
      - REGISTER_TOKEN=${REGISTER_TOKEN:-}
      - PUBLIC_IP=${PUBLIC_IP:-}
      # ---- AI 模型 API Keys（独立模式使用） ----
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - QIANFAN_API_KEY=${QIANFAN_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 允许容器访问宿主机 Ollama
    security_opt:
      - seccomp=unconfined      # 允许 Firefox 沙箱创建用户命名空间
    cap_add:
      - SYS_ADMIN               # Firefox content sandbox 需要 clone(CLONE_NEWUSER)
    volumes:
      - desktop-home:/root
      - ./shared:/shared                              # 宿主机共享目录
      - screenshots:/screenshots                      # 截图输出目录
    shm_size: "${OPENCLAW_SHM_SIZE:-2g}"
    mem_limit: "${OPENCLAW_MEM_LIMIT:-8g}"
    cpus: ${OPENCLAW_CPUS:-4}

volumes:
  desktop-home:
    driver: local
  screenshots:
    driver: local
